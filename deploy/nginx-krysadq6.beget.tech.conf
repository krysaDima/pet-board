# Nginx: фронт (dist после npm run build:vps) + прокси /api → Spring в Docker на 127.0.0.1:8080
# Домен: krysadq6.beget.tech (Beget). Перед HTTPS: certbot certonly/install по доке certbot.
#
# Установка (пример):
#   sudo cp deploy/nginx-krysadq6.beget.tech.conf /etc/nginx/sites-available/pet-board
#   sudo ln -sf /etc/nginx/sites-available/pet-board /etc/nginx/sites-enabled/
#   sudo mkdir -p /var/www/pet-board && sudo rsync -a dist/ /var/www/pet-board/
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS: в панели Beget A-запись krysadq6.beget.tech → IP вашего VPS (например 62.113.110.184).
# Если поддомен смотрел на общий хостинг — перепривяжите запись на IP сервера.
#
# TLS: sudo certbot --nginx -d krysadq6.beget.tech
#
# Spring в Docker лучше не выставлять наружу: -p 127.0.0.1:8080:8080

server {
    listen 80;
    listen [::]:80;
    server_name krysadq6.beget.tech;

    root /var/www/pet-board;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 16M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
