# Фронт + прокси /api → Spring (Docker 127.0.0.1:8080)
# Домен: happyttest.ru + www
#
# DNS у регистратора (или у Beget, если домен на их DNS):
#   Тип A, имя @ (или happyttest.ru) → 62.113.110.184 (ваш публичный IP VPS)
#   Тип A, имя www → 62.113.110.184
#
# Установка:
#   sudo cp .../deploy/nginx-happyttest.ru.conf /etc/nginx/sites-available/pet-board
#   sudo ln -sf /etc/nginx/sites-available/pet-board /etc/nginx/sites-enabled/
#   sudo rsync -a --delete /opt/pet-board/dist/ /var/www/pet-board/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS: sudo certbot --nginx -d happyttest.ru -d www.happyttest.ru

server {
    listen 80;
    listen [::]:80;
    server_name happyttest.ru www.happyttest.ru;

    root /var/www/pet-board;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 16M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
